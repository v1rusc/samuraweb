<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Samura Mebel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #1a1a1a); color: var(--tg-theme-text-color, #ffffff); }
        .card { background-color: var(--tg-theme-secondary-bg-color, #2a2a2a); border: 1px solid #333;}
        .btn-main { background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #fff); }
    </style>
</head>
<body class="p-4 font-sans pb-24">
    <h1 class="text-2xl font-bold mb-6 text-center">Каталог Samura</h1>
    <div id="catalog" class="grid grid-cols-2 gap-4">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selectedProduct = null;

        async function loadCatalog() {
            try {
                const response = await fetch('https://api.jsonbin.io/v3/b/ТВОЙ_BIN_ID/latest', {
    headers: {
        'X-Access-Key': 'ТВОЙ_ACCESS_KEY_ДЛЯ_ЧТЕНИЯ'
    }
});
const jsonResponse = await response.json();
// JSONBin оборачивает наши данные в объект record, поэтому:
const data = jsonResponse.record;
                const container = document.getElementById('catalog');
                
                if (data.products.length === 0) {
                    container.innerHTML = '<p class="col-span-2 text-center text-gray-400">Товары пока не добавлены</p>';
                    return;
                }

                data.products.forEach(prod => {
                    const card = document.createElement('div');
                    card.className = 'card rounded-xl p-3 shadow-lg flex flex-col justify-between';
                    const priceStr = prod.price.toString().replace(/[^0-9]/g, '');
                    
                    card.innerHTML = `
                        <div>
                            <div class="h-32 bg-gray-800 rounded-lg mb-3 flex items-center justify-center text-xs text-gray-500 overflow-hidden">
                                📸 Фото
                            </div>
                            <h2 class="font-semibold text-sm mb-1">${prod.name}</h2>
                            <p class="text-xs text-gray-400 mb-2 truncate">${prod.specs || 'Размеры уточняются'}</p>
                        </div>
                        <button onclick="selectProduct('${prod.id}', '${prod.name}', '${priceStr}')" class="w-full btn-main font-bold py-2 rounded-lg text-sm transition mt-2">
                            ${prod.price}
                        </button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('catalog').innerHTML = '<p class="col-span-2 text-center text-red-500">Ошибка загрузки каталога</p>';
            }
        }

        window.selectProduct = function(id, name, price) {
            selectedProduct = { id, product_name: name, price };
            tg.MainButton.text = `ЗАКАЗАТЬ: ${name}`;
            tg.MainButton.show();
        };

        tg.MainButton.onClick(() => {
            if (selectedProduct) {
                tg.sendData(JSON.stringify(selectedProduct));
            }
        });

        loadCatalog();
    </script>
</body>
</html>
