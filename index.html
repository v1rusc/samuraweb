<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Samura Mebel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Сбрасываем лишнее и задаем светлую тему */
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { 
            background-color: #f3f4f6; /* Светло-серый фон */
            color: #111827;
            margin: 0; padding: 16px; padding-bottom: 90px;
        }
        h1 { text-align: center; font-size: 24px; margin-bottom: 20px; color: #1f2937; }
        
        /* Сетка из двух колонок */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* Карточка товара */
        .card {
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex; flex-direction: column;
            transition: transform 0.1s;
            border: 2px solid transparent; /* Подготовка для рамки выделения */
        }
        .card:active { transform: scale(0.96); }
        
        /* Блок с фото */
        .img-box {
            width: 100%; aspect-ratio: 1 / 1;
            background-color: #e5e7eb;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; }
        .no-photo { position: absolute; color: #9ca3af; font-size: 14px; z-index: 1; }
        
        /* Текст внутри карточки */
        .info { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; }
        .title { font-size: 15px; font-weight: 600; margin: 0 0 4px 0; }
        .specs { font-size: 12px; color: #6b7280; margin: 0 0 10px 0; flex-grow: 1; line-height: 1.3;}
        .price { font-size: 16px; font-weight: 700; color: #2563eb; margin: 0; }
        
        /* Текст загрузки */
        .loading { grid-column: span 2; text-align: center; color: #6b7280; padding: 40px 0; font-size: 15px; }
    </style>
</head>
<body>

    <h1>Каталог Samura</h1>
    <div id="catalog" class="grid">
        <div class="loading">Загрузка каталога...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ⚠️ ВСТАВЬ СВОИ ДАННЫЕ ИЗ JSONBIN ЗДЕСЬ ⚠️
        const BIN_ID = "69de201736566621a8b06bfe"; 
        const ACCESS_KEY = "$2a$10$WBDHSkdjuPINd2WZ61/48eKTNcPQw4.WjoTJCNfkeqy0y8rK5VDAW"; 

        let selectedProduct = null;

        async function loadCatalog() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Access-Key': ACCESS_KEY }
                });

                if (!response.ok) throw new Error("Ошибка связи");

                const jsonResponse = await response.json();
                const data = jsonResponse.record;
                const container = document.getElementById('catalog');
                
                container.innerHTML = '';

                if (!data.products || data.products.length === 0) {
                    container.innerHTML = '<div class="loading">Товары пока не добавлены.</div>';
                    return;
                }

                data.products.forEach(prod => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const priceStr = prod.price.toString().replace(/[^0-9]/g, '');
                    
                    // Фото загружаются с твоего GitHub по ID товара
                    card.innerHTML = `
                        <div class="img-box">
                            <span class="no-photo">📸 Нет фото</span>
                            <img src="${prod.id}.jpg" onerror="this.style.display='none'">
                        </div>
                        <div class="info">
                            <h2 class="title">${prod.name}</h2>
                            <p class="specs">${prod.specs || 'Размеры уточняются'}</p>
                            <p class="price">${prod.price}</p>
                        </div>
                    `;
                    
                    // Клик по карточке выделяет её синей рамкой
                    card.onclick = () => selectProduct(prod.id, prod.name, priceStr, card);
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('catalog').innerHTML = `<div class="loading" style="color:#ef4444;">Ошибка загрузки. Проверьте ключи.</div>`;
            }
        }

        function selectProduct(id, name, price, cardElement) {
            // Убираем рамки со всех карточек и ставим на выбранную
            document.querySelectorAll('.card').forEach(c => c.style.borderColor = 'transparent');
            cardElement.style.borderColor = '#2563eb';

            selectedProduct = { id, product_name: name, price };
            
            tg.MainButton.text = `ОФОРМИТЬ ЗАКАЗ: ${name}`;
            tg.MainButton.color = "#2563eb";
            tg.MainButton.textColor = "#ffffff";
            tg.MainButton.show();
        }

        tg.MainButton.onClick(() => {
            if (selectedProduct) {
                tg.sendData(JSON.stringify(selectedProduct));
            }
        });

        loadCatalog();
    </script>
</body>
</html>
