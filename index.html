<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Samura Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #1c1c1c; --light-gold: #f9f6ee; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #ffffff; color: var(--dark); margin: 0; padding: 16px; padding-bottom: 80px; }
        
        h1 { text-align: center; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 30px; border-bottom: 1px solid var(--light-gold); padding-bottom: 15px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: 0.2s; }
        .card:active { transform: translateY(2px); }
        .img-box { width: 100%; aspect-ratio: 1/1; background: var(--light-gold); position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 12px; text-align: center; }
        .title { font-size: 14px; font-weight: 600; margin: 0 0 5px 0; color: #444; }
        .price { font-size: 15px; font-weight: 700; color: var(--gold); margin: 0; }

        /* МОДАЛКА */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 25px 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .m-title { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .m-price { color: var(--gold); font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        
        .specs-table { background: var(--light-gold); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .s-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; border-bottom: 1px solid #e8e4d8; padding-bottom: 5px; }
        .s-row:last-child { border: none; }
        .s-label { color: #888; }

        .telegraph-link { 
            display: block; width: 100%; padding: 15px; background: var(--dark); color: var(--gold); 
            text-decoration: none; text-align: center; border-radius: 10px; font-weight: 700; 
            margin-bottom: 10px; border: 1px solid var(--gold);
        }
        
        .close-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 20px; float: right; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>SAMURA MEBEL</h1>
    <div id="catalog" class="grid">
        <p style="text-align:center; grid-column: span 2;">Загрузка стиля...</p>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeM()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeM()">ЗАКРЫТЬ</button>
            <h2 id="m-title" class="m-title"></h2>
            <p id="m-price" class="m-price"></p>
            
            <div class="specs-table">
                <div class="s-row"><span class="s-label">Размеры:</span> <span id="m-specs"></span></div>
                <div class="s-row"><span class="s-label">Механизм:</span> <span id="m-mech"></span></div>
            </div>

            <a id="m-link" href="#" target="_blank" class="telegraph-link">📖 ПОЛНЫЙ ОБЗОР (Teletype)</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BIN_ID = "69de201736566621a8b06bfe"; 
        const ACCESS_KEY = "$2a$10$WBDHSkdjuPINd2WZ61/48eKTNcPQw4.WjoTJCNfkeqy0y8rK5VDAW"; 

        let selected = null;

        async function load() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: {'X-Access-Key': ACCESS_KEY} });
                const data = (await res.json()).record;
                const cont = document.getElementById('catalog');
                cont.innerHTML = '';

                data.products.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div class="img-box"><img src="${p.id}.jpg" onerror="this.src='https://via.placeholder.com/300?text=Samura'"></div>
                        <div class="info"><div class="title">${p.name}</div><div class="price">${p.price}</div></div>
                    `;
                    div.onclick = () => openM(p);
                    cont.appendChild(div);
                });
            } catch (e) { document.getElementById('catalog').innerHTML = "Ошибка связи."; }
        }

        function openM(p) {
            selected = p;
            document.getElementById('m-title').innerText = p.name;
            document.getElementById('m-price').innerText = p.price;
            document.getElementById('m-specs').innerText = p.specs || 'Уточняйте';
            document.getElementById('m-mech').innerText = p.mechanism || 'Не указан';
            
            const link = document.getElementById('m-link');
            if(p.telegraph_link && p.telegraph_link.startsWith('http')) {
                link.href = p.telegraph_link;
                link.style.display = 'block';
            } else { link.style.display = 'none'; }

            document.getElementById('modal').style.display = 'flex';
            
            tg.MainButton.text = "ВЫБРАТЬ МОДЕЛЬ";
            tg.MainButton.setParams({color: "#D4AF37", text_color: "#ffffff"});
            tg.MainButton.show();
        }

        function closeM() {
            document.getElementById('modal').style.display = 'none';
            tg.MainButton.hide();
        }

        tg.MainButton.onClick(() => {
            if(selected) {
                const price = selected.price.toString().replace(/[^0-9]/g, '');
                tg.sendData(JSON.stringify({product_name: selected.name, price: price}));
            }
        });

        load();
    </script>
</body>
</html>
